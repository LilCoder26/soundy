<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soundboard</title>

    <!-- Base path for CDN assets -->
    <base href="https://cdn.jsdelivr.net/gh/genizy/soundboard@main/">

    <!-- Google Ads -->
    <script async 
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5521219086088837" 
        crossorigin="anonymous">
    </script>

    <!-- Google Analytics (FIXED: missing ID) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXX'); /* Replace with your real GA ID */
    </script>

    <!-- JS Modules -->
    <script type="module" src="sounds.js"></script>
    <script type="module" src="main.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="controls">
        <button id="toggleFavorites" class="control-button favorites-toggle">⭐ Favorites: OFF</button>
        <button id="toggleButton" class="control-button overlap-toggle">🔇 Overlap: OFF</button>
        <button id="stopButton" class="control-button stop-button">⏹️ Stop All Sounds</button>
        <input id="searchInput" type="text" placeholder="Search sounds...">
    </div>

    <div id="soundboard"></div>
</body>
</html>
